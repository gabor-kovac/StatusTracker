name: Build and deploy StatusTracker to Github Pages
on:
  workflow_dispatch:
  push:
    branches:
      - main
  # schedule:
  #   - cron: '32 1 * * *'
permissions:
  contents: write
  
jobs:
  build-and-deploy:
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2

      - name: Set up node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install build tools
        run: sudo apt install moreutils -y

      - name: Restore npm dependencies
        run: npm ci
        
      - name: Run pre build
        run: npm run pre-build

      - name: Build Angular app
        run: npm run build
        
      - name: Run post build
        run: npm run post-build

      - name: Deploy to Github Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: page
          publish_dir: ./dist
          enable_jekyll: false
